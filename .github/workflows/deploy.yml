name: Fetch & Deploy

on:
  schedule:
    - cron: "0 0,8,16 * * *"   # 0h, 8h, 16h UTC
  workflow_dispatch:             # trigger manual pelo GitHub UI
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Python: correr fetcher ───────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install requests

      - name: Run fetcher
        run: python fetcher.py

      # ── Commit dados atualizados ────────────────────────────────────────────
      - name: Commit data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ frontend/public/data/
          git diff --staged --quiet || git commit -m "chore: update contract data [skip ci]"
          git push

      # ── Node: build Next.js ─────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node deps
        run: npm ci
        working-directory: frontend

      - name: Build static export
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_BASE_PATH: /PSI

      # ── Deploy para GitHub Pages ─────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
